[package]
name = "foam"
version = "0.1.0"
edition = "2024"

[dependencies]
foam_proc_macro = {workspace = true}
foam_psp.workspace = true
foam_common.workspace = true
psp.workspace = true

[build-dependencies]
cfg_aliases = "0.2.1"

[workspace]
members = ["foam_common","foam_proc_macro", "foam_psp"]

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
psp = "0.3.12"
foam_proc_macro.path = "foam_proc_macro"
foam_psp.path = "foam_psp"
foam_common.path = "foam_common"
proc-macro2 = "1.0.2"
quote = "1.0.45"
syn = { version = "2.0.117", features = ["visit-mut", "full"] }
